<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainerprofil — Trovr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo">trovr<span>.</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link-desktop">&larr; Zurück zur Suche</a>

      </div>
    </div>
  </nav>

  <!-- PROFILE -->
  <main class="profile-page">
    <div class="container">

      <!-- PROFILE HEADER -->
      <div class="profile-header" id="profile-header">
        <!-- Populated by JS -->
      </div>

      <!-- PROFILE BODY -->
      <div class="profile-grid">
        <!-- LEFT: Main Content -->
        <div class="profile-main" id="profile-main">
          <!-- Populated by JS -->
        </div>

        <!-- RIGHT: Sidebar -->
        <aside class="profile-sidebar" id="profile-sidebar">
          <!-- Populated by JS -->
        </aside>
      </div>

    </div>

  <!-- MOBILE BOOKING BAR -->
  <div class="mobile-booking-bar" id="mobile-booking-bar" style="display:none;">
    <div class="mobile-bar-price">
      <span class="price-num" id="mobile-price">—</span>
      <span class="price-sub">/Einheit</span>
    </div>
    <button class="mobile-bar-cta" onclick="openContact()">Trainer kontaktieren</button>
  </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="index.html" class="logo">trovr<span>.</span></a>
        <p>Das Verzeichnis für geprüfte Jugend-Fußballtrainer in Deutschland. Mit Führungszeugnis und verifizierter DFB-Lizenz - gefunden von Eltern, denen es wichtig ist.</p>
      </div>
      <div class="footer-bottom">
        <span>&copy; 2026 Trovr. Alle Rechte vorbehalten.</span>
      </div>
    </div>
  </footer>

  <script src="app-de.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const coachId = params.get('id');
      if (!coachId) {
        window.location.href = 'index.html';
        return;
      }
      // Update EN language link to preserve coach ID
      const enLang = document.getElementById('lang-en');
      if (enLang) enLang.href = '../coach.html?id=' + coachId;
      await loadCoaches();
      loadCoachProfile(coachId);
    });
  </script>
</body>
</html>
