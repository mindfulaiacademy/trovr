<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Profile — Trovr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo">trovr<span>.</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link-desktop">&larr; Back to Search</a>

      </div>
    </div>
  </nav>

  <!-- PROFILE -->
  <main class="profile-page">
    <div class="container">

      <!-- PROFILE HEADER -->
      <div class="profile-header" id="profile-header">
        <!-- Populated by JS -->
      </div>

      <!-- PROFILE BODY -->
      <div class="profile-grid">
        <!-- LEFT: Main Content -->
        <div class="profile-main" id="profile-main">
          <!-- Populated by JS -->
        </div>

        <!-- RIGHT: Sidebar -->
        <aside class="profile-sidebar" id="profile-sidebar">
          <!-- Populated by JS -->
        </aside>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="index.html" class="logo">trovr<span>.</span></a>
        <p>The verified youth sports coach directory. Background-checked, credential-verified coaches found by parents who care.</p>
      </div>
      <div class="footer-bottom">
        <span>&copy; 2026 Trovr. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const coachId = params.get('id');
      if (!coachId) {
        window.location.href = 'index.html';
        return;
      }
      // Update DE language link to preserve coach ID
      const deLang = document.getElementById('lang-de');
      if (deLang) deLang.href = 'de/coach.html?id=' + coachId;
      await loadCoaches();
      loadCoachProfile(coachId);
    });
  </script>
</body>
</html>
